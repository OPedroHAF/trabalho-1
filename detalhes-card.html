<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <title>Detalhes da Disciplina</title>
    <link rel="icon" type="image/png" href="assets/imgs/logotipo.png">
</head>
<body class="container-fluid px-5">
    
    <div class="row align-items-center py-3">
        <div class="col-lg-3 col-6">
            <img id="logotipo-img" src="assets/imgs/logotipo.png" alt="Logotipo" style="height: 7em;">
        </div>
        <div class="col text-end">
            <a href="index.html" class="btn btn-outline-secondary btn-sm">← Voltar para o Início</a>
        </div>
    </div>
    
    <div class="row">
        <div class="border-bottom border-2 border-black mb-3">
            <h2>Informações Geral</h2>
        </div>
        
        <div class="d-flex flex-column flex-md-row p-4 gap-4 bg-white rounded shadow-sm">
            <div class="col-lg-6 col-md-6 col-12">
                <img id="detalheFoto" class="d-block w-100 rounded object-fit-cover" src="" alt="Imagem da disciplina" style="max-height: 400px; background-color: #eee;">
            </div>
            
            <div class="bg-light w-100 p-4 rounded d-flex flex-column gap-3">
                <div>
                    <h2 id="detalheNome" class="text-primary fw-bold mb-0">Carregando...</h2>
                </div>
                <div>
                    <p id="detalheDesc" class="text-secondary" style="text-align: justify;"></p>
                </div>
                
                <div class="d-flex gap-5 border-top border-bottom py-2 my-2">
                    <div>
                        <span class="fw-bold text-dark">Carga Horária:</span> 
                        <span id="detalheCarga" class="text-muted">--</span>
                    </div>
                    <div>
                        <span class="fw-bold text-dark">Professor:</span> 
                        <span id="detalheProfessor" class="text-muted">--</span>
                    </div>
                </div>
                
                <div class="row mt-2">
                    <div class="col-md-6 mb-3">
                        <h5 class="fw-bold text-dark fs-6 border-bottom pb-1">Conteúdo Programático</h5>
                        <ul id="detalheModulos" class="ps-3 text-secondary small"></ul>
                    </div>
                    <div class="col-md-6 mb-3">
                        <h5 class="fw-bold text-dark fs-6 border-bottom pb-1">Competências Desenvolvidas</h5>
                        <ul id="detalheCompetencias" class="ps-3 text-secondary small"></ul>
                    </div>
                </div>
            </div>
        </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="assets/script.js"></script>
    <script src="assets/script-detalhes.js"></script>
</body>
</html>
